specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ShieldedPool
    network: arbitrum-sepolia
    source:
      abi: ShieldedPool
      address: "0x8C390ec72e72b68A5099f95B09E88c4dD869eafc"
      startBlock: 247977406
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Ragequit
        - VerifierAdded
        - WormholeApprover
        - WormholeCommitment
        - WormholeEntry
        - WormholeNullifier
        - WormholeTree
        - Branch
        - BranchAdded
        - BranchWormholeTreeSnapshot
        - MasterTreesUpdated
        - MasterShieldedTreeLeaf
        - MasterWormholeTreeLeaf
        - MasterShieldedTree
        - MasterWormholeTree
        - MasterShieldedTreeSnapshot
        - MasterWormholeTreeSnapshot
      abis:
        - name: ShieldedPool
          file: ../contracts/out/ShieldedPool.sol/ShieldedPool.json
      eventHandlers:
        - event: Ragequit(indexed uint256,indexed address,indexed
            address,address,uint256,uint256)
          handler: handleRagequit
        - event: VerifierAdded(address,uint256,uint256)
          handler: handleVerifierAdded
        - event: WormholeApproverSet(indexed address,bool)
          handler: handleWormholeApproverSet
        - event: WormholeCommitment(indexed uint256,indexed
            uint256,uint256,uint256,address,uint256,address,address,uint256,bool)
          handler: handleWormholeCommitment
        - event: WormholeEntry(indexed uint256,indexed address,indexed
            address,address,uint256,uint256,bytes32)
          handler: handleWormholeEntry
        - event: WormholeNullifier(indexed bytes32)
          handler: handleWormholeNullifier
        - event: WormholeTreeUpdated(indexed uint256,indexed uint256,indexed
            uint256,uint256)
          handler: handleWormholeTreeUpdated
        - event: MasterTreesUpdated(uint256,uint256,indexed uint256,indexed
            uint256,uint256,uint256)
          handler: handleMasterTreesUpdated
        - event: MasterShieldedTreeLeaf(indexed uint256,indexed uint256,indexed
            uint256,uint256,uint256)
          handler: handleMasterShieldedTreeLeaf
        - event: MasterWormholeTreeLeaf(indexed uint256,indexed uint256,indexed
            uint256,uint256,uint256)
          handler: handleMasterWormholeTreeLeaf
        - event: BranchAdded(indexed uint64,indexed address)
          handler: handleBranchAdded
      file: ./src/shielded-pool.ts
templates:
  - kind: ethereum/contract
    name: ShieldedPoolBranch
    network: arbitrum-sepolia
    source:
      abi: ShieldedPoolBranch
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ShieldedTransfer
        - ShieldNullifier
        - Withdrawal
        - BranchVerifierAdded
        - BranchShieldedTree
        - BranchShieldedTreeSnapshot
        - BranchShieldedTreeUpdate
      abis:
        - name: ShieldedPoolBranch
          file: ../contracts/out/ShieldedPoolBranch.sol/ShieldedPoolBranch.json
      eventHandlers:
        - event: ShieldedTransfer(indexed
            uint256,uint256,uint256[],bytes32[],(address,address,uint256,uint256,bytes32)[])
          handler: handleBranchShieldedTransfer
        - event: ShieldedTreeUpdated(indexed uint256,indexed uint256,uint256,uint256)
          handler: handleBranchShieldedTreeUpdated
        - event: VerifierAdded(address,uint256,uint256)
          handler: handleBranchVerifierAdded
      file: ./src/shielded-pool-branch.ts
  - kind: ethereum/contract
    name: ShieldedPoolDelegateBranch
    network: arbitrum-sepolia
    source:
      abi: ShieldedPoolDelegateBranch
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ShieldedTransferSigner
        - SignerTree
        - SignerTreeUpdate
      abis:
        - name: ShieldedPoolDelegateBranch
          file: ../contracts/out/ShieldedPoolDelegateBranch.sol/ShieldedPoolDelegateBranch.json
      eventHandlers:
        - event: ShieldedTransferSigner(indexed uint256,indexed uint256,bytes32,bytes32)
          handler: handleBranchShieldedTransferSigner
        - event: SignerTreeUpdated(indexed uint256,indexed uint256,uint256,uint256)
          handler: handleSignerTreeUpdated
      file: ./src/shielded-pool-delegate-branch.ts
