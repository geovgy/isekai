specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ShieldedPool
    network: sepolia
    source:
      abi: ShieldedPool
      address: "0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9"
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Ragequit
        - ShieldedTransfer
        - VerifierAdded
        - WormholeApprover
        - WormholeCommitment
        - WormholeEntry
        - WormholeNullifier
        - ShieldNullifier
        - WormholeTree
        - ShieldedTree
        - BranchTreesUpdated
        - MasterTreesUpdated
        - MasterShieldedTreeLeaf
        - MasterWormholeTreeLeaf
        - MasterShieldedTree
        - MasterWormholeTree
        - BranchShieldedTreeSnapshot
        - BranchWormholeTreeSnapshot
      abis:
        - name: ShieldedPool
          file: ../contracts/out/ShieldedPool.sol/ShieldedPool.json
      eventHandlers:
        - event: Ragequit(indexed uint256,indexed address,indexed
            address,address,uint256,uint256)
          handler: handleRagequit
        - event: ShieldedTransfer(indexed
            uint256,uint256,uint256[],bytes32[],(address,address,uint256,uint256)[])
          handler: handleShieldedTransfer
        - event: VerifierAdded(address,uint256,uint256)
          handler: handleVerifierAdded
        - event: WormholeApproverSet(indexed address,bool)
          handler: handleWormholeApproverSet
        - event: WormholeCommitment(indexed uint256,indexed
            uint256,uint256,uint256,bytes32,address,address,uint256,bool)
          handler: handleWormholeCommitment
        - event: WormholeEntry(indexed uint256,indexed address,indexed
            address,address,uint256,uint256)
          handler: handleWormholeEntry
        - event: WormholeNullifier(indexed bytes32)
          handler: handleWormholeNullifier
        - event: BranchTreesUpdated(uint256,uint256,indexed uint256,indexed
            uint256,uint256,uint256)
          handler: handleBranchTreesUpdated
        - event: MasterTreesUpdated(indexed uint256,indexed uint256,uint256,uint256)
          handler: handleMasterTreesUpdated
        - event: MasterShieldedTreeLeaf(indexed uint256,indexed uint256,indexed
            uint256,uint256,uint256)
          handler: handleMasterShieldedTreeLeaf
        - event: MasterWormholeTreeLeaf(indexed uint256,indexed uint256,indexed
            uint256,uint256,uint256)
          handler: handleMasterWormholeTreeLeaf
      file: ./src/shielded-pool.ts
