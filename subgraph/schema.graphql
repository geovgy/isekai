type Ragequit @entity(immutable: true) {
  id: Bytes!
  entryId: BigInt! # uint256
  quitter: Bytes! # address
  returnedTo: Bytes! # address
  token: Bytes! # address
  tokenId: BigInt! # uint256
  amount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Branch @entity(immutable: false) {
  id: Bytes! # branch address
  address: Bytes! # address
  chainId: BigInt! # uint64
  master: Bytes! # address
  createdAt: BigInt!
  updatedAt: BigInt!
}

type BranchAdded @entity(immutable: true) {
  id: Bytes!
  chainId: BigInt! # uint64
  branch: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type MasterShieldedTreeLeaf @entity(immutable: true) {
  id: ID! # treeId:branchRoot:branchChainId
  treeId: BigInt! # uint256
  branchRoot: BigInt! # uint256
  branchChainId: BigInt! # uint256
  branchBlockNumber: BigInt! # uint256
  branchTimestamp: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type MasterWormholeTreeLeaf @entity(immutable: true) {
  id: ID! # masterTreeId:branchRoot:branchChainId
  treeId: BigInt! # uint256
  branchRoot: BigInt! # uint256
  branchChainId: BigInt! # uint256
  branchBlockNumber: BigInt! # uint256
  branchTimestamp: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type MasterShieldedTree @entity(immutable: false) {
  id: ID! # treeId
  treeId: BigInt! # uint256
  leaves: [BigInt!]! # uint256[]
  size: BigInt! # uint256
  createdAt: BigInt! # uint256
  updatedAt: BigInt! # uint256
}

type MasterWormholeTree @entity(immutable: false) {
  id: ID! # treeId
  treeId: BigInt! # uint256
  leaves: [BigInt!]! # uint256[]
  size: BigInt! # uint256
  createdAt: BigInt! # uint256
  updatedAt: BigInt! # uint256
}

type BranchShieldedTreeSnapshot @entity(immutable: true) {
  id: ID! # branchAddress:treeId:root
  branch: Branch!
  treeId: BigInt! # uint256
  root: BigInt! # uint256
  leaves: [BigInt!]! # uint256[]
  size: BigInt! # uint256
  blockNumber: BigInt!
  createdAt: BigInt! # uint256
}

type BranchWormholeTreeSnapshot @entity(immutable: true) {
  id: ID! # treeId:root
  treeId: BigInt! # uint256
  root: BigInt! # uint256
  leaves: [BigInt!]! # uint256[]
  size: BigInt! # uint256
  blockNumber: BigInt!
  createdAt: BigInt! # uint256
}

type MasterShieldedTreeSnapshot @entity(immutable: true) {
  id: ID! # treeId:root
  treeId: BigInt! # uint256
  root: BigInt! # uint256
  leaves: [BigInt!]! # uint256[]
  size: BigInt! # uint256
  blockNumber: BigInt!
  createdAt: BigInt! # uint256
}

type MasterWormholeTreeSnapshot @entity(immutable: true) {
  id: ID! # treeId:root
  treeId: BigInt! # uint256
  root: BigInt! # uint256
  leaves: [BigInt!]! # uint256[]
  size: BigInt! # uint256
  blockNumber: BigInt!
  createdAt: BigInt! # uint256
}

type BranchShieldedTree @entity(immutable: false) {
  id: ID! # branch:treeId
  branch: Branch!
  treeId: BigInt! # uint256
  roots: [BigInt!]! # uint256[]
  size: BigInt! # uint256
  createdAt: BigInt! # uint256
  updatedAt: BigInt! # uint256
}

type BranchShieldedTreeUpdate @entity(immutable: true) {
  id: ID! # branch:treeId:root
  branch: Branch!
  treeId: BigInt! # uint256
  root: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SignerTree @entity(immutable: false) {
  id: ID! # branch:treeId
  branch: Branch!
  branchAddress: Bytes! # address
  treeId: BigInt! # uint256
  roots: [BigInt!]! # uint256[]
  size: BigInt! # uint256
  createdAt: BigInt!
  updatedAt: BigInt!
}

type SignerTreeUpdate @entity(immutable: true) {
  id: ID! # branch:treeId:root
  branch: Branch!
  treeId: BigInt! # uint256
  root: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type WormholeTree @entity(immutable: false) {
  id: ID! # treeId
  treeId: BigInt! # uint256
  leaves: [BigInt!]! # uint256[]
  commitments: [WormholeCommitment!]! # WormholeCommitment[]
  size: BigInt! # uint256
  createdAt: BigInt! # uint256
  updatedAt: BigInt! # uint256
}

type ShieldedTransfer @entity(immutable: true) {
  id: ID! # branch:treeId:startIndex
  branch: Branch!
  treeId: BigInt! # uint256
  startIndex: BigInt! # uint256
  commitments: [BigInt!]! # uint256[]
  nullifiers: [ShieldNullifier!]! # ShieldNullifier[]
  withdrawals: [Withdrawal!]! # Withdrawal[]
  signerCommitment: Bytes! # bytes32
  signerNullifier: Bytes! # bytes32
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Withdrawal @entity(immutable: true) {
  id: ID! # branchShieldedTransfer id:withdrawalIndex
  to: Bytes! # address
  token: Bytes! # address
  tokenId: BigInt! # uint256
  amount: BigInt! # uint256
  confidentialContext: Bytes! # bytes32
  shieldedTransfer: ShieldedTransfer! @derivedFrom(field: "withdrawals")
}

type ShieldNullifier @entity(immutable: true) {
  id: Bytes! # nullifier
  nullifier: Bytes! # bytes32
  shieldedTransfer: ShieldedTransfer! @derivedFrom(field: "nullifiers")
}

type VerifierAdded @entity(immutable: true) {
  id: Bytes!
  verifier: Bytes! # address
  inputs: BigInt! # uint256
  outputs: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type BranchVerifierAdded @entity(immutable: true) {
  id: Bytes!
  branch: Branch!
  verifier: Bytes! # address
  inputs: BigInt! # uint256
  outputs: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type WormholeApprover @entity(immutable: false) {
  id: Bytes! # address
  address: Bytes! # address
  isApprover: Boolean! # bool
  createdAt: BigInt! # uint256
  updatedAt: BigInt! # uint256
}

type WormholeCommitment @entity(immutable: true) {
  id: ID! # treeId:leafIndex
  entry: WormholeEntry! # WormholeEntry
  commitment: BigInt! # uint256
  treeId: BigInt! # uint256
  leafIndex: BigInt! # uint256
  token: Bytes! # address
  tokenId: BigInt! # uint256
  from: Bytes! # address
  to: Bytes! # address
  amount: BigInt! # uint256
  approved: Boolean! # bool
  submittedBy: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type WormholeEntry @entity(immutable: false) {
  id: ID! # entryId
  entryId: BigInt! # uint256
  token: Bytes! # address
  from: Bytes! # address
  to: Bytes! # address
  tokenId: BigInt! # uint256
  amount: BigInt! # uint256
  confidentialContext: Bytes! # bytes32
  commitment: WormholeCommitment @derivedFrom(field: "entry") # if undefined, the entry is not appended to the wormhole tree yet
  submitted: Boolean! # bool
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type WormholeNullifier @entity(immutable: true) {
  id: Bytes! # nullifier
  nullifier: Bytes! # bytes32
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type BranchTreesUpdated @entity(immutable: true) {
  id: Bytes!
	logIndex: BigInt! # uint256
  shieldedTreeId: BigInt! # uint256
  wormholeTreeId: BigInt! # uint256
  branchShieldedRoot: BigInt! # uint256
  branchWormholeRoot: BigInt! # uint256
  branchBlockNumber: BigInt!
  branchBlockTimestamp: BigInt!
  blockNumber: BigInt!
	blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type MasterTreesUpdated @entity(immutable: true) {
  id: Bytes!
  logIndex: BigInt! # uint256
	masterShieldedTreeId: BigInt! # uint256
	masterWormholeTreeId: BigInt! # uint256
  masterShieldedRoot: BigInt! # uint256
  masterWormholeRoot: BigInt! # uint256
	masterBlockNumber: BigInt! # uint256
	masterBlockTimestamp: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
